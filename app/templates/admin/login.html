{%- from "macros.html" import csrf -%}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — MeroPasal</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: #fff; padding: 2.5rem; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .logo { text-align: center; font-size: 2rem; margin-bottom: 0.5rem; }
        h1 { text-align: center; font-size: 1.4rem; color: #1a1a2e; margin-bottom: 0.25rem; }
        .sub { text-align: center; color: #6b7280; font-size: 0.9rem; margin-bottom: 1.8rem; }
        .alert { padding: 0.75rem 1rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.9rem; }
        .alert-error   { background: #fee2e2; color: #991b1b; }
        .alert-success { background: #dcfce7; color: #166534; }
        label { display: block; font-size: 0.85rem; font-weight: 600; color: #374151; margin-bottom: 0.4rem; }
        input { width: 100%; padding: 0.65rem 0.9rem; border: 1px solid #d1d5db; border-radius: 8px; font-size: 0.95rem; outline: none; transition: border 0.2s; }
        input:focus { border-color: #4f46e5; }
        .form-group { margin-bottom: 1.2rem; }
        button { width: 100%; padding: 0.75rem; background: #4f46e5; color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 0.5rem; transition: background 0.2s; }
        button:hover { background: #4338ca; }
        .hint { text-align: center; margin-top: 1.2rem; font-size: 0.8rem; color: #9ca3af; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">🛒</div>
    <h1>Admin Panel</h1>
    <p class="sub">MeroPasal — Staff Access Only</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
    {% endwith %}

    <form method="POST">
{{ csrf() }}
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="admin" required autofocus
                   value="{{ request.form.get('username', '') }}">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit">Log In</button>
    </form>
    <p class="hint">← <a href="{{ url_for('auth.home') }}">Back to store</a></p>
</div>
</body>
</html>
