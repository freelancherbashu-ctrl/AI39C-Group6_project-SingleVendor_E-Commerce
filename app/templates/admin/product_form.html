{% extends "base.html" %}
{% block title %}{{ 'Edit' if product else 'Add' }} Product{% endblock %}
{% block content %}
<div class="page-header">
    <h1>{{ 'Edit' if product else 'Add New' }} Product</h1>
</div>

<div class="form-card">
    <form method="post">
        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" value="{{ product.name if product else '' }}" required class="form-control">
        </div>
        <div class="form-group">
            <label>Category</label>
            <input type="text" name="category" value="{{ product.category if product else '' }}" class="form-control">
        </div>
        <div class="form-group">
            <label>Price (Rs.)</label>
            <input type="number" name="price" step="0.01" min="0" value="{{ product.price if product else '' }}" required class="form-control">
        </div>
        <div class="form-group">
            <label>Stock</label>
            <input type="number" name="stock" min="0" value="{{ product.stock if product else 0 }}" required class="form-control">
        </div>
        <div class="form-group">
            <label>Image URL</label>
            <input type="url" name="image_url" value="{{ product.image_url if product else '' }}" class="form-control">
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea name="description" rows="4" class="form-control">{{ product.description if product else '' }}</textarea>
        </div>
        <button type="submit" class="btn btn-primary">Save Product</button>
        <a href="/admin/products" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
