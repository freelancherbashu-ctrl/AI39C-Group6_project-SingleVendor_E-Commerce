<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Forgot Password</title>

    <link rel="stylesheet"
    href="{{ url_for('static',
    filename='css/forgot_pass.css') }}">
    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/fla.css') }}">

</head>

<body>
    {% include "includes/flash_message.html" %}

<div class="forgot-container">

    <!-- LEFT SIDE -->

    <div class="forgot-left">

        <div class="logo-box">

            <img
            src="{{ url_for(
            'static',
            filename='images/logo.png'
            ) }}"

            class="logo">

        </div>

        <h1>MeroPasal</h1>

        <p>

            We will help recover your account

        </p>

    </div>


    <!-- RIGHT SIDE -->

    <div class="forgot-right">

        <h2>

            Forgot Password

        </h2>

        <p class="sub">

            Enter your email
            to receive reset link

        </p>

        <form method="POST">

            <input

            type="email"

            name="email"

            placeholder="Enter Email"

            required

            >

            <button type="submit">

                Send Reset Link

            </button>

        </form>


        <!-- RESET LINK SHOW -->

        {% if reset_link %}

        <div class="reset-link">

            <p>

                Reset Link:

            </p>

            <a href="{{ reset_link }}">

                {{ reset_link }}

            </a>

        </div>

        {% endif %}


        <div class="back">

            <a href="{{ url_for(
            'authroutes.login'
            ) }}">

                ← Back To Login

            </a>

        </div>

    </div>

</div>

</body>

</html>
