<!DOCTYPE html>
<html>
<head>
    <title>Meropasal</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="admin-container">
        <nav class="sidebar">
            <div class="logo-area">
                <h2>🛍️ Meropasal</h2>
                <p>Admin Panel</p>
            </div>
            <a href="/" class="nav-item active">📁 Categories</a>
            <a href="/add-category" class="nav-item">➕ Add Category</a>
        </nav>
        <main class="main-panel">
            <header class="top-header">
                <h1>📋 Category Management</h1>
                <div class="admin-info">👋 Admin</div>
            </header>
            <div class="content">
                {% block content %}{% endblock %}
            </div>
            <footer class="footer">
                <span class="brand">🛍️ Meropasal</span>
                <span>© 2026 All Rights Reserved</span>
            </footer>
        </main>
    </div>
</body>
</html>
