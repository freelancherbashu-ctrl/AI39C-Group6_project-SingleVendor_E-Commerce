{% extends 'base.html' %}
{% block title %}Login - MeroPasal{% endblock %}
{% block style %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}
<section class="auth-page">
    <div class="auth-card">

        <div class="auth-logo"></div>
        <h1>Welcome Back</h1>


        <a href="{{ url_for('google.login') }}" class="google-btn">
            <img src="https://developers.google.com/identity/images/g-logo.png" width="18">
            Continue with Google:
        </a>

        <div class="divider">or</div>

        <p class="auth-sub">Login to your MeroPasal account</p>

        <form method="POST" action="{{ url_for('auth.login') }}">

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="you@example.com"
                       value="{{ request.form.get('email', '') }}" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <a href="{{ url_for('auth.forgot_password') }}" class="forgot-link">
                Forgot password?
            </a>
            <button type="submit" class="auth-btn">Log In</button>

        </form>

        <p class="auth-switch">
            Don't have an account?
            <a href="{{ url_for('auth.register') }}">Create one</a>
        </p>

    </div>
</section>
{% endblock %}
