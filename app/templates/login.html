{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="form-container">
    <h2>Login to MeroPasal</h2>

    <form method="POST">
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>
        <div class="form-group">
            <a href="{{ url_for('authroutes.forgot_password') }}">Forgot Password?</a>
        </div>
        <button type="submit" class="btn">Login</button>
    </form>

    <div class="form-footer">
        Don't have an account? <a href="{{ url_for('authroutes.register') }}">Register</a>
    </div>
</div>
{% endblock %}
