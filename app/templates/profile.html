{% extends "base.html" %}
{% block title %}My Profile - ShopOne{% endblock %}

{% block content %}
<h1>My Profile</h1>

<div class="card auth-card">
    <form method="POST" action="{{ url_for('customer.profile') }}">
        <div class="form-group">
            <label for="full_name">Full Name</label>
            <input type="text" id="full_name" name="full_name" value="{{ customer.full_name }}" required>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" value="{{ customer.email }}" disabled>
        </div>
        <div class="form-group">
            <label for="phone">Phone</label>
            <input type="text" id="phone" name="phone" value="{{ customer.phone or '' }}">
        </div>
        <div class="form-group">
            <label for="address">Address</label>
            <input type="text" id="address" name="address" value="{{ customer.address or '' }}">
        </div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
    </form>
</div>
{% endblock %}
