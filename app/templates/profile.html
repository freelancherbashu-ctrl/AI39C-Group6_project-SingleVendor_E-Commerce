{% extends "base.html" %}
{% block title %}My Profile{% endblock %}
{% block content %}
<div class="page-header">
    <h1>My Profile</h1>
</div>

<div class="form-card">
    <h2>Profile Information</h2>
    <form method="post" action="/profile">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="full_name" value="{{ customer.full_name }}" required class="form-control">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" value="{{ customer.email }}" disabled class="form-control">
        </div>
        <div class="form-group">
            <label>Phone</label>
            <input type="text" name="phone" value="{{ customer.phone or '' }}" class="form-control">
        </div>
        <div class="form-group">
            <label>Address</label>
            <input type="text" name="address" value="{{ customer.address or '' }}" class="form-control">
        </div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
    </form>
</div>

<div class="form-card" style="margin-top: 24px;">
    <h2>Change Password</h2>
    <form method="post" action="/profile/change-password">
        <div class="form-group">
            <label>Current Password</label>
            <input type="password" name="current_password" required class="form-control">
        </div>
        <div class="form-group">
            <label>New Password</label>
            <input type="password" name="new_password" required minlength="6" class="form-control">
        </div>
        <div class="form-group">
            <label>Confirm New Password</label>
            <input type="password" name="confirm_password" required class="form-control">
        </div>
        <button type="submit" class="btn btn-primary">Change Password</button>
    </form>
</div>
{% endblock %}
