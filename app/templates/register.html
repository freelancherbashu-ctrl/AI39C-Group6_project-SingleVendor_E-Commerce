{% extends 'base.html' %}
{%- from "macros.html" import csrf -%}
{% block title %}Register - MeroPasal{% endblock %}
{% block style %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}
<section class="auth-page">
    <div class="auth-card">

        <div class="auth-logo">🛍️</div>
        <h1>Create Account</h1>
        <p class="auth-sub">Join MeroPasal and start shopping</p>

        <form method="POST" action="{{ url_for('auth.register') }}">
{{ csrf() }}

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="full_name" placeholder="Your full name"
                       value="{{ request.form.get('full_name', '') }}" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="you@example.com"
                       value="{{ request.form.get('email', '') }}" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password"
                       placeholder="At least 6 characters" required>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password"
                       placeholder="Repeat your password" required>
            </div>

            <button type="submit" class="auth-btn">Create Account</button>

        </form>

        <p class="auth-switch">
            Already have an account?
            <a href="{{ url_for('auth.login') }}">Log in</a>
        </p>

    </div>
</section>
{% endblock %}
